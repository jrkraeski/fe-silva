<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fê Silva — Identidade Visual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wine:#6B2737;
    --wine-dark:#4A1828;
    --wine-light:#9B4A5A;
    --terra:#C4704A;
    --terra-light:#E8A882;
    --gold:#B8924A;
    --gold-soft:#d8b878;
    --cream:#F5EDE3;
    --warm:#FBF7F3;
    --ink:#2C1A14;
    --ink-soft:#6b5147;
  }
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;font-family:'Jost',sans-serif;background:#f0eee9;color:#2C1A14}
  .ab,.ab *,.ab *::before,.ab *::after{box-sizing:border-box}

  /* ============== shared artboard primitives ============== */
  .ab{position:relative;overflow:hidden;font-family:'Jost',sans-serif;color:var(--ink);}
  .ab.cream{background:var(--cream)}
  .ab.warm{background:var(--warm)}
  .ab.wine{background:var(--wine);color:var(--cream)}
  .ab.wine-dark{background:var(--wine-dark);color:var(--cream)}
  .ab.terra{background:var(--terra);color:var(--warm)}
  .serif{font-family:'Cormorant Garamond',serif}
  .italic{font-style:italic}
  .it{font-family:'Cormorant Garamond',serif;font-style:italic}

  /* paper texture — subtle */
  .paper{
    background-image:
      radial-gradient(at 12% 8%, rgba(196,112,74,0.07) 0px, transparent 50%),
      radial-gradient(at 88% 92%, rgba(107,39,55,0.06) 0px, transparent 50%);
  }
  .dark-paper{
    background-image:
      radial-gradient(at 12% 8%, rgba(184,146,74,0.12) 0px, transparent 55%),
      radial-gradient(at 88% 92%, rgba(196,112,74,0.10) 0px, transparent 55%);
  }

  /* The "Fê" lockup — used everywhere */
  .lk{display:inline-flex;align-items:baseline;line-height:1;font-family:'Cormorant Garamond',serif;letter-spacing:.005em}
  .lk .fe{font-style:italic;color:var(--gold);font-weight:600}
  .lk .silva{color:var(--wine-dark);font-weight:500;margin-left:.18em}
  .lk.on-dark .silva{color:var(--cream)}
  .lk .dot{
    width:.18em;height:.18em;border-radius:50%;
    background:var(--terra);display:inline-block;
    margin:0 .22em .12em .22em;align-self:center;
  }
  .lk .amp{color:var(--gold);font-style:italic;font-weight:400}
  .lk .tag{
    font-family:'Jost',sans-serif;font-size:.18em;
    letter-spacing:.32em;text-transform:uppercase;
    color:var(--ink-soft);font-weight:500;
    margin-left:.6em;align-self:center;
  }
  .lk.on-dark .tag{color:rgba(245,237,227,.65)}

  /* utility */
  .row{display:flex}
  .col{display:flex;flex-direction:column}
  .center{display:grid;place-items:center}
  .between{display:flex;justify-content:space-between;align-items:center}
  .hr{height:1px;background:rgba(44,26,20,.16)}
  .hr.gold{background:var(--gold)}
  .hr.cream{background:rgba(245,237,227,.18)}
  .eyebrow{font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:var(--wine);font-weight:500;font-family:'Jost',sans-serif}
  .eyebrow.gold{color:var(--gold)}

  .eyebrow.terra{color:var(--terra)}

// ============ DESIGN CANVAS ============
function DesignCanvas({ children }) {

    <div style={{minHeight:'100vh',background:'#e8e5df',fontFamily:"'Jost',sans-serif"}}>

}

function DCArtboard({ id, label, width, height, children }) {

// ===== ATOMS =====
// Shared atoms — logo lockup, botanical illustrations, icons, watermarks.

// ============== LOCKUP (the main wordmark) ==============
// Renders "Fê · Silva" with optional tagline below.
// Props: size (em base), align ('start'|'center'), onDark (bool), withDot, tagBelow
function Lockup({ size = 56, onDark = false, withDot = true, tagBelow = null, dotColor = null }) {
  const dot = withDot ? (
    <span className="dot" style={{ background: dotColor || '#C4704A' }}></span>
  ) : null;
  return (
    <div style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1 }}>
      <span className={'lk' + (onDark ? ' on-dark' : '')} style={{ fontSize: size }}>
        <span className="fe">Fê</span>
        {dot}
        <span className="silva">Silva</span>
      </span>
      {tagBelow && (
        <div style={{
          marginTop: size * 0.30,
          fontFamily: "'Jost', sans-serif",
          fontSize: size * 0.15,
          letterSpacing: '.36em',
          textTransform: 'uppercase',
          color: onDark ? 'rgba(245,237,227,.75)' : '#6b5147',
          fontWeight: 500,
          textAlign: 'center',
        }}>
          {tagBelow}
        </div>
      )}
    </div>
  );
}

// Stacked lockup: Fê italic huge on top, Silva below in caps
function LockupStack({ size = 80, onDark = false }) {
  return (
    <div style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1, fontFamily: "'Cormorant Garamond', serif" }}>
      <span style={{ fontStyle: 'italic', fontWeight: 600, color: '#B8924A', fontSize: size, letterSpacing: '-.01em' }}>Fê</span>
      <div style={{
        marginTop: size * 0.04, display: 'flex', alignItems: 'center', gap: size * 0.18,
      }}>
        <span style={{ height: 1, width: size * 0.4, background: onDark ? 'rgba(184,146,74,.55)' : 'rgba(184,146,74,.7)' }}></span>
        <span style={{
          fontFamily: "'Jost', sans-serif", fontSize: size * 0.16, letterSpacing: '.38em',
          textTransform: 'uppercase', color: onDark ? '#F5EDE3' : '#4A1828', fontWeight: 500,
        }}>Silva</span>
        <span style={{ height: 1, width: size * 0.4, background: onDark ? 'rgba(184,146,74,.55)' : 'rgba(184,146,74,.7)' }}></span>
      </div>
    </div>
  );
}

// QR code component — uses window.qrcode (qrcode-generator)
function QRCodeSVG({ data, size = 100, fg = '#2C1A14', bg = 'transparent', padding = 0 }) {
  const [mat, setMat] = React.useState(null);
  React.useEffect(() => {
    if (typeof window.qrcode !== 'function') {
      const t = setTimeout(() => setMat('retry'), 80);
      return () => clearTimeout(t);
    }
    try {
      const qr = window.qrcode(0, 'M');
      qr.addData(data);
      qr.make();
      const count = qr.getModuleCount();
      const cells = [];
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          if (qr.isDark(r, c)) cells.push([c, r]);
        }
      }
      setMat({ count, cells });
    } catch (e) {
      setMat(null);
    }
  }, [data, mat === 'retry' ? Math.random() : 0]);
  if (!mat || mat === 'retry') {
    return <div style={{ width: size, height: size, background: bg }}></div>;
  }
  const { count, cells } = mat;
  const total = count + padding * 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${total} ${total}`} shapeRendering="crispEdges">
      {bg !== 'transparent' && <rect width={total} height={total} fill={bg} />}
      {cells.map(([x, y], i) => (
        <rect key={i} x={x + padding} y={y + padding} width="1" height="1" fill={fg} />
      ))}
    </svg>
  );
}

Object.assign(window, {
  Lockup, LockupStack, MonogramF,
  StemTall, Branch, Leaf, Divider, ImagePlaceholder,
  WAGlyph, IGGlyph, PinGlyph, GlobeGlyph,

      <DCSection id="papelaria" title="Papelaria & bônus" subtitle="Recibo, etiqueta, wallpaper de WhatsApp">
